# Local MongoDB for development. Production uses MongoDB Atlas (set MONGODB_URI).
# Usage: `make infra-up` (or `docker compose up -d`), then `npm run dev`.
services:
  mongo:
    image: mongo:7
    container_name: resilience-cards-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
